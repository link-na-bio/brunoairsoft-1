    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const animatedElements = document.querySelectorAll('.elementor-element[data-settings]');

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const el = entry.target;
                        try {
                            const settings = JSON.parse(el.getAttribute('data-settings'));
                            let animClass = settings._animation || settings.animation || settings._animation_mobile || settings.animation_mobile;

                            if (animClass && animClass !== 'none') {
                                el.classList.add('animated', animClass);
                                el.style.opacity = 1;
                            }
                        } catch (e) { }
                        observer.unobserve(el);
                    }
                });
            }, { threshold: 0.1 });

            animatedElements.forEach(el => {
                if (el.getAttribute('data-settings').includes('animation') && !el.getAttribute('data-settings').includes('"animation":"none"') && !el.getAttribute('data-settings').includes('"_animation":"none"')) {
                    el.style.opacity = 0;
                    observer.observe(el);
                }
            });
        });
    </script>
